name: Ibiza News Production Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_migration:
        description: "Apply pending news Supabase migrations"
        required: true
        default: false
        type: boolean
      deploy_functions:
        description: "Deploy news Edge Functions"
        required: true
        default: true
        type: boolean
      run_publish_after_deploy:
        description: "Run the news collector after deploy"
        required: true
        default: false
        type: boolean
      target_date:
        description: "Europe/Madrid date, YYYY-MM-DD. Blank uses today's Madrid date."
        required: false
        type: string
      source_keys:
        description: "Optional comma-separated source keys. Blank runs all enabled sources."
        required: false
        type: string
      limit_per_source:
        description: "Maximum candidates per source"
        required: true
        default: "25"
        type: string

concurrency:
  group: ibiza-news-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SYNC_ADMIN_TOKEN: ${{ secrets.SYNC_ADMIN_TOKEN }}
      PROJECT_REF: zqgsgrwtxufxebaujegn
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check deploy secrets
        run: |
          if [ "${{ inputs.deploy_migration }}" = "true" ] || [ "${{ inputs.deploy_functions }}" = "true" ]; then
            test -n "$SUPABASE_ACCESS_TOKEN" || (echo "Missing SUPABASE_ACCESS_TOKEN secret" && exit 1)
          fi
          if [ "${{ inputs.deploy_migration }}" = "true" ]; then
            test -n "$SUPABASE_DB_PASSWORD" || (echo "Missing SUPABASE_DB_PASSWORD secret" && exit 1)
          fi
          test -n "$SUPABASE_URL" || (echo "Missing SUPABASE_URL secret" && exit 1)
          if [ "${{ inputs.run_publish_after_deploy }}" = "true" ]; then
            test -n "$SUPABASE_SERVICE_ROLE_KEY" || test -n "$SYNC_ADMIN_TOKEN" || (echo "Missing SUPABASE_SERVICE_ROLE_KEY or SYNC_ADMIN_TOKEN secret" && exit 1)
          fi

      - name: Install Supabase CLI
        if: inputs.deploy_migration == true || inputs.deploy_functions == true
        run: npm install --global supabase@latest

      - name: Link Supabase project
        if: inputs.deploy_migration == true
        run: supabase link --project-ref "$PROJECT_REF"

      - name: Apply pending migrations
        if: inputs.deploy_migration == true
        run: supabase db push

      - name: Deploy news collector
        if: inputs.deploy_functions == true
        run: supabase functions deploy collect-ibiza-news --project-ref "$PROJECT_REF"

      - name: Deploy news compatibility reader
        if: inputs.deploy_functions == true
        run: supabase functions deploy get-news --project-ref "$PROJECT_REF"

      - name: Publish source-backed news digest
        if: inputs.run_publish_after_deploy == true
        run: |
          node <<'NODE'
          const sourceKeys = (process.env.SOURCE_KEYS_INPUT || "")
            .split(",")
            .map((value) => value.trim())
            .filter(Boolean);

          const payload = {
            run_type: "manual",
            dry_run: false,
            publish: true,
            use_ai: true,
            max_ai_summaries: 8,
            limit_per_source: Number(process.env.LIMIT_PER_SOURCE_INPUT || 25),
          };

          if (process.env.TARGET_DATE_INPUT) payload.target_date = process.env.TARGET_DATE_INPUT;
          if (sourceKeys.length > 0) payload.source_keys = sourceKeys;

          const supabaseUrl = process.env.SUPABASE_URL.replace(/\/$/, "");
          const madridDate = () =>
            new Intl.DateTimeFormat("en-CA", {
              timeZone: "Europe/Madrid",
              year: "numeric",
              month: "2-digit",
              day: "2-digit",
            }).format(new Date());

          const expectedDigestDate = payload.target_date || madridDate();
          const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
          const waitForPublishedDigest = async () => {
            for (let attempt = 1; attempt <= 30; attempt += 1) {
              const digestResponse = await fetch(`${supabaseUrl}/functions/v1/get-news`);
              const digest = await digestResponse.json().catch(() => ({}));
              const storyCount = Array.isArray(digest.stories) ? digest.stories.length : 0;
              console.log(
                `Digest verification attempt ${attempt}: date=${digest.digest?.digest_date || "none"} stories=${storyCount}`,
              );

              if (digestResponse.ok && digest.digest?.digest_date === expectedDigestDate && storyCount > 0) {
                return;
              }
              await wait(10000);
            }
            throw new Error(`Timed out waiting for published digest ${expectedDigestDate}`);
          };

          const response = await fetch(`${supabaseUrl}/functions/v1/collect-ibiza-news`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              ...(process.env.SUPABASE_SERVICE_ROLE_KEY ? { Authorization: `Bearer ${process.env.SUPABASE_SERVICE_ROLE_KEY}` } : {}),
              ...(process.env.SYNC_ADMIN_TOKEN ? { "x-sync-admin-token": process.env.SYNC_ADMIN_TOKEN } : {}),
            },
            body: JSON.stringify(payload),
          });

          const text = await response.text();
          console.log(text);
          if (!response.ok) {
            const isIdleTimeout = response.status === 504 && text.includes("IDLE_TIMEOUT");
            if (isIdleTimeout) {
              console.log("Collector hit Supabase idle timeout; verifying whether the digest published successfully.");
              await waitForPublishedDigest();
              console.log(`Digest ${expectedDigestDate} is published; treating the idle timeout as recovered.`);
              process.exit(0);
            }
            throw new Error(`collect-ibiza-news failed with ${response.status}`);
          }
          NODE
        env:
          TARGET_DATE_INPUT: ${{ inputs.target_date }}
          SOURCE_KEYS_INPUT: ${{ inputs.source_keys }}
          LIMIT_PER_SOURCE_INPUT: ${{ inputs.limit_per_source }}
