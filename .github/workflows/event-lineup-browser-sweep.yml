name: Event lineup browser sweep

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/event-lineup-browser-sweep.yml"
      - "scripts/event-lineup-browser-sweep.mjs"
      - "package-lock.json"
      - "package.json"
  workflow_dispatch:
    inputs:
      window_days:
        description: Days ahead to scan
        required: false
        default: "30"
      limit:
        description: Maximum events to inspect
        required: false
        default: "100"
      venue_pattern:
        description: Optional case-insensitive venue filter, for targeted packets
        required: false
        default: ""
  schedule:
    - cron: "20 4 * * *"

jobs:
  shadow-lineup-sweep-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    name: shadow-lineup-sweep (manual)
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      WINDOW_DAYS: ${{ inputs.window_days }}
      LIMIT: ${{ inputs.limit }}
      VENUE_PATTERN: ${{ inputs.venue_pattern }}
      RUN_TYPE: manual
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: |
          npm install
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Run shadow lineup sweep
        run: node scripts/event-lineup-browser-sweep.mjs

  shadow-lineup-sweep-matrix:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: shadow-lineup-sweep (pull-request-smoke)
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      WINDOW_DAYS: "180"
      LIMIT: "3"
      VENUE_PATTERN: "CamelPhat|Hï Ibiza"
      RUN_TYPE: ${{ github.event_name == 'schedule' && 'daily' || 'manual' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: |
          npm install
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Run shadow lineup sweep
        run: node scripts/event-lineup-browser-sweep.mjs

  shadow-lineup-sweep-scheduled:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    name: shadow-lineup-sweep (daily-next-30-days)
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      WINDOW_DAYS: "30"
      LIMIT: "100"
      RUN_TYPE: daily
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: |
          npm install
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Run shadow lineup sweep
        run: node scripts/event-lineup-browser-sweep.mjs
