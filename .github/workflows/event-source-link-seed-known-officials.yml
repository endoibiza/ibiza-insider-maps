name: Event source link seed known officials

on:
  workflow_dispatch:
    inputs:
      apply:
        description: Apply staging source-link upserts
        required: false
        default: "false"

jobs:
  source-link-seed-known-officials:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: source-link-seed-known-officials
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      APPLY: ${{ inputs.apply }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Seed known official source links
        run: node scripts/event-source-link-seed-known-officials.mjs
