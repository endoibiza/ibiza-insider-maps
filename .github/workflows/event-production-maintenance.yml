name: Event production maintenance

on:
  workflow_dispatch:
    inputs:
      apply_ticket_repairs:
        description: "Apply deterministic ticket-option repairs"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      check_cova_channel_manager:
        description: "Check whether Cova Santa events are exposed through Fourvenues Channel Manager"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      sync_chinois_channel_manager:
        description: "Refresh and reconcile Chinois Channel Manager events"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      run_repair_report:
        description: "Generate season repair report artifact"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      APPLY_TICKET_REPAIRS: ${{ github.event_name == 'schedule' && 'true' || inputs.apply_ticket_repairs }}
      COVA_SANTA_FOURVENUES_HOST_ID: Vlcq9gl8300dm018kfuq3908zGLrHrFN
      CHINOIS_FOURVENUES_HOST_ID: wlw4t6xtf013101dd1sstd9pw5199tkW
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Refresh Fourvenues host access
        env:
          TARGET: auth
          DRY_RUN: "true"
          HORIZON_DAYS: "7"
          INCLUDE_RECORDS: "false"
          INCLUDE_VIP_AVAILABILITY: "false"
          LIMIT: "100"
        run: node scripts/fourvenues-service-sync.mjs

      - name: Check Cova Santa Channel Manager exposure
        if: github.event_name == 'schedule' || inputs.check_cova_channel_manager == 'true'
        env:
          TARGET: events
          DRY_RUN: "true"
          ORGANIZATION_ID: ${{ env.COVA_SANTA_FOURVENUES_HOST_ID }}
          HORIZON_DAYS: "180"
          INCLUDE_RECORDS: "false"
          INCLUDE_VIP_AVAILABILITY: "true"
          LIMIT: "100"
        run: node scripts/fourvenues-service-sync.mjs

      - name: Sync Chinois Channel Manager events
        if: github.event_name == 'schedule' || inputs.sync_chinois_channel_manager == 'true'
        env:
          TARGET: events
          DRY_RUN: "false"
          ORGANIZATION_ID: ${{ env.CHINOIS_FOURVENUES_HOST_ID }}
          HORIZON_DAYS: "180"
          INCLUDE_RECORDS: "false"
          INCLUDE_VIP_AVAILABILITY: "true"
          LIMIT: "100"
        run: node scripts/fourvenues-service-sync.mjs

      - name: Reconcile Chinois Channel Manager rows
        if: github.event_name == 'schedule' || inputs.sync_chinois_channel_manager == 'true'
        env:
          ORGANIZATION_ID: ${{ env.CHINOIS_FOURVENUES_HOST_ID }}
          HORIZON_DAYS: "180"
          APPLY: "true"
        run: node scripts/chinois-fourvenues-reconcile.mjs

      - name: Repair exact Chinois official event links
        if: github.event_name == 'schedule' || inputs.sync_chinois_channel_manager == 'true'
        env:
          HORIZON_DAYS: "180"
          APPLY: "true"
        run: node scripts/chinois-exact-official-links-repair.mjs

      - name: Maintain Cova Santa ticket options
        env:
          APPLY: ${{ env.APPLY_TICKET_REPAIRS }}
          LIMIT: "140"
        run: node scripts/cova-ticket-options-seed.mjs

      - name: Maintain Eden ticket options
        env:
          APPLY: ${{ env.APPLY_TICKET_REPAIRS }}
          LIMIT: "140"
        run: node scripts/eden-ticket-options-seed.mjs

      - name: Maintain Ushuaia ticket options
        env:
          APPLY: ${{ env.APPLY_TICKET_REPAIRS }}
          LIMIT: "140"
        run: node scripts/ushuaia-ticket-options-seed.mjs

      - name: Clean stale booking options
        env:
          APPLY: ${{ env.APPLY_TICKET_REPAIRS }}
          LIMIT: "2000"
        run: node scripts/event-booking-options-cleanup.mjs

      - name: Backfill missing visible event URL options
        env:
          APPLY: ${{ env.APPLY_TICKET_REPAIRS }}
          LIMIT: "2000"
        run: node scripts/event-booking-options-backfill-visible-urls.mjs

      - name: Audit booking option health
        env:
          START_DATE: ""
          LIMIT: "1000"
        run: node scripts/event-booking-options-audit.mjs | tee event-booking-options-audit.json

      - name: Generate Night League lineup fullness report
        env:
          APPLY_STAGING: "false"
          WINDOW_DAYS: "180"
          LIMIT: "260"
          OUTPUT_FILE: night-league-lineup-fullness-report.md
        run: node scripts/night-league-lineup-fullness.mjs

      - name: Generate season repair report
        if: github.event_name == 'schedule' || inputs.run_repair_report == 'true'
        env:
          WINDOW_DAYS: "180"
          OUTPUT_FILE: event-season-repair-report.md
        run: node scripts/event-season-repair-report.mjs

      - name: Upload season repair report
        if: github.event_name == 'schedule' || inputs.run_repair_report == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: event-production-maintenance-report
          path: |
            event-season-repair-report.md
            night-league-lineup-fullness-report.md
            event-booking-options-audit.json
