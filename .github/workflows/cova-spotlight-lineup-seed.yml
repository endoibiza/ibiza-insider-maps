name: Cova Spotlight lineup seed

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply Cova Santa lineup updates to Supabase"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Seed Cova Santa lineups
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APPLY: ${{ inputs.apply }}
        run: node scripts/cova-spotlight-lineup-seed.mjs
