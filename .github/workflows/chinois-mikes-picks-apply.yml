name: Chinois Mike's Picks apply

on:
  workflow_dispatch:
    inputs:
      apply:
        description: Mark the verified Chinois rows as Mike's Picks
        required: false
        default: "false"

jobs:
  chinois-mikes-picks-apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: chinois-mikes-picks-apply
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      APPLY: ${{ inputs.apply }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Apply Chinois Mike's Picks
        run: node scripts/chinois-mikes-picks-apply.mjs
