name: Fourvenues Production Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_functions:
        description: "Deploy Fourvenues Edge Functions"
        required: true
        default: true
        type: boolean
      run_chinois_dry_run_after_deploy:
        description: "Run Chinois dry-run after deploy"
        required: true
        default: true
        type: boolean
      chinois_organization_id:
        description: "Chinois Fourvenues host organization ID"
        required: true
        default: "wlw4t6xtf013101dd1sstd9pw5199tkW"
        type: string
      horizon_days:
        description: "Dry-run days ahead"
        required: true
        default: "30"
        type: string

concurrency:
  group: fourvenues-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PROJECT_REF: zqgsgrwtxufxebaujegn
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check deploy secrets
        run: |
          if [ "${{ inputs.deploy_functions }}" = "true" ]; then
            test -n "$SUPABASE_ACCESS_TOKEN" || (echo "Missing SUPABASE_ACCESS_TOKEN secret" && exit 1)
          fi
          if [ "${{ inputs.run_chinois_dry_run_after_deploy }}" = "true" ]; then
            test -n "$SUPABASE_URL" || (echo "Missing SUPABASE_URL secret" && exit 1)
            test -n "$SUPABASE_SERVICE_ROLE_KEY" || (echo "Missing SUPABASE_SERVICE_ROLE_KEY secret" && exit 1)
          fi

      - name: Install Supabase CLI
        if: inputs.deploy_functions == true
        run: npm install --global supabase@latest

      - name: Deploy Fourvenues auth sync
        if: inputs.deploy_functions == true
        run: supabase functions deploy sync-fourvenues-auth --project-ref "$PROJECT_REF" --use-api

      - name: Deploy Fourvenues events sync
        if: inputs.deploy_functions == true
        run: supabase functions deploy sync-fourvenues-events --project-ref "$PROJECT_REF" --use-api

      - name: Deploy Fourvenues service-role runner
        if: inputs.deploy_functions == true
        run: supabase functions deploy run-fourvenues-sync-service-role --project-ref "$PROJECT_REF" --use-api

      - name: Chinois ticket-rate dry-run
        if: inputs.run_chinois_dry_run_after_deploy == true
        env:
          TARGET: events
          DRY_RUN: "true"
          ORGANIZATION_ID: ${{ inputs.chinois_organization_id }}
          HORIZON_DAYS: ${{ inputs.horizon_days }}
          INCLUDE_RECORDS: "true"
          INCLUDE_VIP_AVAILABILITY: "true"
          LIMIT: "100"
        run: node scripts/fourvenues-service-sync.mjs
