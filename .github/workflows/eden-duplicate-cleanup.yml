name: Eden duplicate cleanup

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Hide exact legacy Eden duplicates"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Hide exact Eden duplicates
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APPLY: ${{ inputs.apply }}
        run: node scripts/eden-duplicate-cleanup.mjs
