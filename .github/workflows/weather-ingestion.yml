name: Ibiza Weather Ingestion

on:
  schedule:
    - cron: "15 3 * * *"
    - cron: "30 8,12,16 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Store private evidence only; do not publish the public weather report"
        required: true
        default: true
        type: boolean
      publish:
        description: "Publish the public weather report"
        required: true
        default: false
        type: boolean
      run_type:
        description: "Run type"
        required: true
        default: "manual"
        type: choice
        options:
          - manual
          - daily
          - alert_refresh
          - source_audit
      target_date:
        description: "Europe/Madrid date, YYYY-MM-DD. Blank uses today's Madrid date."
        required: false
        type: string
      source_keys:
        description: "Optional comma-separated source keys for a targeted test"
        required: false
        type: string

concurrency:
  group: ibiza-weather-ingestion
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SYNC_ADMIN_TOKEN: ${{ secrets.SYNC_ADMIN_TOKEN }}
      DRY_RUN_INPUT: ${{ github.event.inputs.dry_run || '' }}
      PUBLISH_INPUT: ${{ github.event.inputs.publish || '' }}
      RUN_TYPE_INPUT: ${{ github.event.inputs.run_type || '' }}
      TARGET_DATE_INPUT: ${{ github.event.inputs.target_date || '' }}
      SOURCE_KEYS_INPUT: ${{ github.event.inputs.source_keys || '' }}
      SCHEDULE_CRON: ${{ github.event.schedule || '' }}
    steps:
      - name: Invoke Supabase weather collector
        run: |
          node <<'NODE'
          const scheduled = process.env.GITHUB_EVENT_NAME === "schedule";
          const supabaseUrl = process.env.SUPABASE_URL;
          const token = process.env.SYNC_ADMIN_TOKEN;

          if (!supabaseUrl) throw new Error("Missing SUPABASE_URL secret");
          if (!token) throw new Error("Missing SYNC_ADMIN_TOKEN secret");

          const sourceKeys = (process.env.SOURCE_KEYS_INPUT || "")
            .split(",")
            .map((value) => value.trim())
            .filter(Boolean);

          const scheduledAlertRefresh = scheduled && process.env.SCHEDULE_CRON === "30 8,12,16 * * *";

          const payload = {
            run_type: scheduled ? (scheduledAlertRefresh ? "alert_refresh" : "daily") : (process.env.RUN_TYPE_INPUT || "manual"),
            dry_run: scheduled ? false : process.env.DRY_RUN_INPUT !== "false",
            publish: scheduled ? true : process.env.PUBLISH_INPUT === "true",
            forecast_days: 7,
          };

          if (process.env.TARGET_DATE_INPUT) payload.target_date = process.env.TARGET_DATE_INPUT;
          if (sourceKeys.length > 0) payload.source_keys = sourceKeys;

          console.log("Running collect-ibiza-weather", JSON.stringify({ ...payload, source_keys: sourceKeys }, null, 2));

          const response = await fetch(`${supabaseUrl.replace(/\/$/, "")}/functions/v1/collect-ibiza-weather`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-sync-admin-token": token,
            },
            body: JSON.stringify(payload),
          });

          const text = await response.text();
          console.log(text);

          if (!response.ok) {
            throw new Error(`collect-ibiza-weather failed with ${response.status}`);
          }
          NODE
