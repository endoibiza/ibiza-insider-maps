name: Ibiza News Ingestion

on:
  schedule:
    - cron: "45 3 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Store private evidence only; do not publish public stories or digest"
        required: true
        default: true
        type: boolean
      publish:
        description: "Publish verified direct-source stories"
        required: true
        default: false
        type: boolean
      use_ai:
        description: "Use capped AI translation/summarization after evidence is stored"
        required: true
        default: true
        type: boolean
      target_date:
        description: "Europe/Madrid date, YYYY-MM-DD. Blank uses today's Madrid date."
        required: false
        type: string
      source_keys:
        description: "Optional comma-separated source keys for a small test run"
        required: false
        type: string
      limit_per_source:
        description: "Maximum candidates per source"
        required: true
        default: "25"
        type: string
      enforce_primary_resolution:
        description: "Require official/owner evidence for announcements (enable after shadow acceptance)"
        required: true
        default: false
        type: boolean

concurrency:
  group: ibiza-news-ingestion
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SYNC_ADMIN_TOKEN: ${{ secrets.SYNC_ADMIN_TOKEN }}
      DRY_RUN_INPUT: ${{ github.event.inputs.dry_run || '' }}
      PUBLISH_INPUT: ${{ github.event.inputs.publish || '' }}
      USE_AI_INPUT: ${{ github.event.inputs.use_ai || '' }}
      TARGET_DATE_INPUT: ${{ github.event.inputs.target_date || '' }}
      SOURCE_KEYS_INPUT: ${{ github.event.inputs.source_keys || '' }}
      LIMIT_PER_SOURCE_INPUT: ${{ github.event.inputs.limit_per_source || '25' }}
      ENFORCE_PRIMARY_RESOLUTION_INPUT: ${{ github.event.inputs.enforce_primary_resolution || 'false' }}
    steps:
      - name: Invoke Supabase news collector
        run: |
          node <<'NODE'
          const scheduled = process.env.GITHUB_EVENT_NAME === "schedule";
          const supabaseUrl = process.env.SUPABASE_URL;
          const serviceRoleKey = process.env.SUPABASE_SERVICE_ROLE_KEY;
          const token = process.env.SYNC_ADMIN_TOKEN;

          if (!supabaseUrl) throw new Error("Missing SUPABASE_URL secret");
          if (!serviceRoleKey && !token) {
            throw new Error("Missing SUPABASE_SERVICE_ROLE_KEY or SYNC_ADMIN_TOKEN secret");
          }

          const sourceKeys = (process.env.SOURCE_KEYS_INPUT || "")
            .split(",")
            .map((value) => value.trim())
            .filter(Boolean);

          const basePayload = {
            run_type: scheduled ? "daily" : "manual",
            dry_run: scheduled ? false : process.env.DRY_RUN_INPUT !== "false",
            publish: scheduled ? true : process.env.PUBLISH_INPUT === "true",
            use_ai: scheduled ? true : process.env.USE_AI_INPUT !== "false",
            max_ai_summaries: 8,
            limit_per_source: Number(process.env.LIMIT_PER_SOURCE_INPUT || 25),
            enforce_primary_resolution: scheduled ? false : process.env.ENFORCE_PRIMARY_RESOLUTION_INPUT === "true",
          };

          if (process.env.TARGET_DATE_INPUT) basePayload.target_date = process.env.TARGET_DATE_INPUT;

          const madridDate = () =>
            new Intl.DateTimeFormat("en-CA", {
              timeZone: "Europe/Madrid",
              year: "numeric",
              month: "2-digit",
              day: "2-digit",
            }).format(new Date());

          const expectedDigestDate = basePayload.target_date || madridDate();
          const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
          const waitForPublishedDigest = async () => {
            for (let attempt = 1; attempt <= 30; attempt += 1) {
              const digestResponse = await fetch(`${supabaseUrl.replace(/\/$/, "")}/functions/v1/get-news`);
              const digest = await digestResponse.json().catch(() => ({}));
              const storyCount = Array.isArray(digest.stories) ? digest.stories.length : 0;
              console.log(
                `Digest verification attempt ${attempt}: date=${digest.digest?.digest_date || "none"} stories=${storyCount}`,
              );

              if (digestResponse.ok && digest.digest?.digest_date === expectedDigestDate && storyCount > 0) {
                return;
              }
              await wait(10000);
            }
            throw new Error(`Timed out waiting for published digest ${expectedDigestDate}`);
          };

          const defaultBatches = [
            {
              label: "formentera-media",
              maxAiSummaries: 3,
              sourceKeys: ["radio-illa-actualitat-rss"],
            },
            {
              label: "core-media",
              maxAiSummaries: 5,
              sourceKeys: [
                "diario-general-rss",
                "periodico-pitiusas-atom",
                "periodico-ibiza-atom",
                "periodico-santa-eularia-atom",
                "lavoz-ibiza-rss",
                "lavoz-general-rss",
              ],
            },
            {
              label: "official-review",
              maxAiSummaries: 0,
              sourceKeys: [
                "santa-eularia-news-rss",
                "santa-eularia-sitemap",
                "consell-news-page",
                "eivissa-news-page",
                "sant-antoni-news-page",
                "sant-josep-sitemap",
                "sant-antoni-events-ical",
              ],
            },
          ];

          const customMaxAiSummaries = sourceKeys.length === 1 && sourceKeys[0] === "radio-illa-actualitat-rss"
            ? 3
            : basePayload.max_ai_summaries;
          const batches = sourceKeys.length > 0
            ? [{ label: "custom-source-keys", maxAiSummaries: customMaxAiSummaries, sourceKeys }]
            : defaultBatches;

          const invokeCollector = async (batch) => {
            const payload = {
              ...basePayload,
              max_ai_summaries: batch.maxAiSummaries,
              source_keys: batch.sourceKeys,
            };

            console.log(`Running collect-ibiza-news batch: ${batch.label}`);
            console.log(JSON.stringify(payload, null, 2));

            const response = await fetch(`${supabaseUrl.replace(/\/$/, "")}/functions/v1/collect-ibiza-news`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                ...(serviceRoleKey ? { Authorization: `Bearer ${serviceRoleKey}` } : {}),
                ...(token ? { "x-sync-admin-token": token } : {}),
              },
              body: JSON.stringify(payload),
            });

            const text = await response.text();
            console.log(text);

            if (!response.ok) {
              const isIdleTimeout = response.status === 504 && text.includes("IDLE_TIMEOUT");
              if (isIdleTimeout && payload.publish && !payload.dry_run) {
                console.log("Collector hit Supabase idle timeout; verifying whether the digest published successfully.");
                await waitForPublishedDigest();
                console.log(`Digest ${expectedDigestDate} is published; treating the idle timeout as recovered.`);
                return;
              }
              throw new Error(`collect-ibiza-news batch ${batch.label} failed with ${response.status}`);
            }
          };

          const resolverResponse = await fetch(`${supabaseUrl.replace(/\/$/, "")}/functions/v1/resolve-ibiza-signals`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              ...(serviceRoleKey ? { Authorization: `Bearer ${serviceRoleKey}` } : {}),
              ...(token ? { "x-sync-admin-token": token } : {}),
            },
            body: JSON.stringify({
              target_date: basePayload.target_date,
              dry_run: false,
              limit: 300,
            }),
          });
          const resolverText = await resolverResponse.text();
          console.log(resolverText);
          if (!resolverResponse.ok) throw new Error(`resolve-ibiza-signals failed with ${resolverResponse.status}`);

          for (const batch of batches) {
            await invokeCollector(batch);
          }

          const verifyDigest = async () => {
            const digestResponse = await fetch(`${supabaseUrl.replace(/\/$/, "")}/functions/v1/get-news`);
            const digest = await digestResponse.json().catch(() => ({}));
            const stories = Array.isArray(digest.stories) ? digest.stories : [];
            const badSourceUrls = stories.filter((story) => {
              const sourceUrl = String(story.source_url || "");
              return !sourceUrl || /\/(rss|feed)\/?$/i.test(sourceUrl);
            });

            console.log(
              `Final digest verification: date=${digest.digest?.digest_date || "none"} stories=${stories.length} badSourceUrls=${badSourceUrls.length}`,
            );

            if (!digestResponse.ok) throw new Error(`get-news verification failed with ${digestResponse.status}`);
            if (digest.digest?.digest_date !== expectedDigestDate) {
              throw new Error(`Expected digest ${expectedDigestDate}, got ${digest.digest?.digest_date || "none"}`);
            }
            if (stories.length === 0) throw new Error(`Digest ${expectedDigestDate} has no public stories`);
            if (badSourceUrls.length > 0) {
              throw new Error(`Digest ${expectedDigestDate} has ${badSourceUrls.length} missing/feed source URLs`);
            }
          };

          if (basePayload.publish && !basePayload.dry_run) {
            await verifyDigest();
          }
          NODE
